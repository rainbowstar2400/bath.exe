<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fff8f0">
  <title>Bath.exe 〜いいから入れ〜</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- 浮遊する泡の装飾 -->
  <div class="bubbles" aria-hidden="true">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen" class="screen">
    <nav class="top-nav">
      <button onclick="showStatsScreen()" aria-label="きろく">📊</button>
      <button onclick="showSettingsScreen()" aria-label="設定">⚙️</button>
    </nav>

    <!-- 時計エリア -->
    <div class="clock-area">
      <p id="current-time" class="current-time">--:--</p>
      <p id="estimate-msg" class="estimate-msg">今入れば --:-- には出れるよ！</p>
    </div>

    <!-- チャットエリア（flex:1で広がる） -->
    <div class="chat-area-wrap">
      <div class="chat-watermark" aria-hidden="true">Bath.exe</div>
      <div id="chat-area" class="chat-area"></div>
    </div>

    <!-- 下部アクションエリア -->
    <div class="bottom-actions">
      <div class="chat-controls">
        <div class="input-row">
          <input type="text" id="message-input" placeholder="言い訳をどうぞ…"
                 onkeydown="if(event.key==='Enter')sendMessage()">
          <button id="send-btn" onclick="sendMessage()">送信</button>
        </div>
        <p id="remaining" class="remaining">残り 10/10</p>
      </div>
      <button id="bath-btn" class="btn-bath" onclick="handleBathAction()">
        <span id="bath-btn-label" class="btn-bath-label">今はいる！</span>
      </button>
    </div>
  </div>

  <!-- 設定画面 -->
  <div id="settings-screen" class="screen" style="display:none">
    <nav class="top-nav">
      <button onclick="showMainScreen()">← もどる</button>
      <span></span>
    </nav>

    <header>
      <h1>設定</h1>
    </header>

    <div class="settings-form">
      <div class="setting-item">
        <label for="notify-time">通知時刻</label>
        <input type="time" id="notify-time" value="23:00">
      </div>

      <div class="setting-item">
        <label for="notify-toggle">通知</label>
        <label class="toggle">
          <input type="checkbox" id="notify-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item has-tips">
        <label for="bath-duration">
          お風呂の時間
          <span class="setting-tips">💡 少し長めに見積もっておくのがおすすめです</span>
        </label>
        <select id="bath-duration">
          <option value="5">5分</option>
          <option value="10">10分</option>
          <option value="15">15分</option>
          <option value="20" selected>20分</option>
          <option value="25">25分</option>
          <option value="30">30分</option>
          <option value="35">35分</option>
          <option value="40">40分</option>
          <option value="45">45分</option>
          <option value="50">50分</option>
          <option value="55">55分</option>
          <option value="60">60分</option>
          <option value="65">65分</option>
          <option value="70">70分</option>
          <option value="75">75分</option>
          <option value="80">80分</option>
          <option value="85">85分</option>
          <option value="90">90分</option>
        </select>
      </div>

      <div class="setting-item has-tips">
        <label for="bath-time-type">
          お風呂のタイミング
          <span class="setting-tips" id="bath-time-type-tips">💡 深夜0時を過ぎても<br>正午までの入浴は前日の記録になります</span>
        </label>
        <select id="bath-time-type">
          <option value="night" selected>夜風呂派</option>
          <option value="morning">朝風呂派</option>
        </select>
      </div>

      <button id="perm-btn" class="btn-perm" onclick="requestPermission()" style="display:none">
        通知を許可する
      </button>

      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>

  <!-- 記録画面 -->
  <div id="stats-screen" class="screen" style="display:none">
    <nav class="top-nav">
      <button onclick="showMainScreen()">← もどる</button>
      <span></span>
    </nav>

    <header>
      <h1>きろく</h1>
    </header>

    <div id="stats-content" class="stats-content">
      <p id="stats-summary" class="stats-summary"></p>
      <div id="stats-days" class="stats-days"></div>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div id="edit-overlay" class="edit-overlay" style="display:none">
    <div class="edit-popup">
      <h2 id="edit-date-label"></h2>
      <div class="edit-field">
        <label for="edit-started">入った時刻</label>
        <input type="time" id="edit-started">
      </div>
      <div class="edit-field">
        <label for="edit-done">出た時刻</label>
        <input type="time" id="edit-done">
      </div>
      <button id="edit-save-btn" class="edit-save-btn" onclick="saveEdit()">保存</button>
      <button class="edit-cancel-btn" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>

  <!-- オンボーディング -->
  <div id="onboarding-overlay" class="onboarding-overlay" style="display:none">
    <div class="onboarding-popup">
      <!-- ステップ1: ようこそ -->
      <div class="onboarding-step" data-step="1">
        <div class="onboarding-icon">🛁</div>
        <h2>ようこそ！</h2>
        <p>Bath.exe は、あなたがお風呂に入るのを<br>後押しするアプリです</p>
        <button class="onboarding-btn" onclick="onboardingNext()">つぎへ</button>
      </div>

      <!-- ステップ2: 通知時刻 -->
      <div class="onboarding-step" data-step="2" style="display:none">
        <h2>何時にお風呂に入りたい？</h2>
        <input type="time" id="ob-notify-time" class="onboarding-input" value="23:00">
        <p class="onboarding-desc">この時間に後押しの通知が届きます！</p>
        <button class="onboarding-btn" onclick="onboardingNext()">つぎへ</button>
      </div>

      <!-- ステップ3: お風呂の時間 -->
      <div class="onboarding-step" data-step="3" style="display:none">
        <h2>お風呂にかかる時間は<br>どのくらい？</h2>
        <select id="ob-bath-duration" class="onboarding-input">
          <option value="5">5分</option>
          <option value="10">10分</option>
          <option value="15">15分</option>
          <option value="20" selected>20分</option>
          <option value="25">25分</option>
          <option value="30">30分</option>
          <option value="35">35分</option>
          <option value="40">40分</option>
          <option value="45">45分</option>
          <option value="50">50分</option>
          <option value="55">55分</option>
          <option value="60">60分</option>
          <option value="65">65分</option>
          <option value="70">70分</option>
          <option value="75">75分</option>
          <option value="80">80分</option>
          <option value="85">85分</option>
          <option value="90">90分</option>
        </select>
        <p class="onboarding-desc">「今入ったらいつ出れるか」がわかります！</p>
        <button class="onboarding-btn" onclick="onboardingNext()">つぎへ</button>
      </div>

      <!-- ステップ4: 通知許可 -->
      <div class="onboarding-step" data-step="4" style="display:none">
        <h2>通知を許可してね！</h2>
        <p class="onboarding-desc">後押しの通知を届けるために必要です</p>
        <button class="onboarding-btn" onclick="onboardingPermission()">通知を許可する</button>
        <button class="onboarding-link" onclick="onboardingNext()">あとで</button>
      </div>

      <!-- ステップ5: 完了 -->
      <div class="onboarding-step" data-step="5" style="display:none">
        <div class="onboarding-icon">🎉</div>
        <h2>準備完了！</h2>
        <p>言い訳があれば聞きますが、<br>最終的には入ってもらいますよ</p>
        <button class="onboarding-btn" onclick="onboardingComplete()">はじめる</button>
      </div>

      <!-- 進行インジケーター -->
      <div class="onboarding-dots">
        <span class="onboarding-dot active"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/app.js"></script>
</body>
</html>
